<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MÎK AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #04050d;
      --bg2:       #080b18;
      --surface:   #0d1022;
      --surface2:  #111628;
      --border:    rgba(255,255,255,0.06);
      --border2:   rgba(255,255,255,0.1);
      --accent:    #5b8eff;
      --accent2:   #a78bfa;
      --accent3:   #34d399;
      --text:      #e8eaf0;
      --text2:     #a0a8c0;
      --muted:     #5a6080;
      --danger:    #f87171;
      --user-bg:   #1a2040;
      --ai-bg:     #0d1022;
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    html,body { height:100%; overflow:hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      height: 100vh;
    }

    /* ══════════════════════════════════════
       SIDEBAR
    ══════════════════════════════════════ */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
      z-index: 100;
    }
    .sidebar-header {
      padding: 20px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .logo-planet {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #2a3a7a, #0a0e1f);
      border: 1px solid rgba(91,142,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 0 12px rgba(91,142,255,0.3);
      animation: float 5s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }

    .new-chat-btn {
      width: 100%;
      margin: 12px 16px;
      width: calc(100% - 32px);
      padding: 10px 14px;
      background: rgba(91,142,255,0.1);
      border: 1px solid rgba(91,142,255,0.25);
      border-radius: 10px;
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
    }
    .new-chat-btn:hover { background: rgba(91,142,255,0.18); border-color: rgba(91,142,255,0.4); }

    .sidebar-section {
      padding: 8px 12px 4px;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .chat-history {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px;
    }
    .chat-history::-webkit-scrollbar { width: 4px; }
    .chat-history::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }
    .history-item {
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.83rem;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: 0.15s;
      margin-bottom: 2px;
    }
    .history-item:hover { background: var(--surface); color: var(--text); }
    .history-item.active { background: var(--surface2); color: var(--text); }

    /* Mode tabs in sidebar */
    .mode-section { padding: 8px; border-top: 1px solid var(--border); }
    .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 4px 4px 8px; }
    .mode-btn {
      padding: 8px 6px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: 0.2s;
    }
    .mode-btn:hover { background: var(--surface); border-color: var(--border2); color: var(--text); }
    .mode-btn.active { background: rgba(91,142,255,0.12); border-color: rgba(91,142,255,0.35); color: var(--accent); }
    .mode-btn .mode-icon { font-size: 16px; }

    /* Sidebar footer */
    .sidebar-footer {
      padding: 12px 8px;
      border-top: 1px solid var(--border);
    }
    .user-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }
    .user-card:hover { background: var(--surface); }
    .user-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2a3a7a, #1a0e3a);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .user-avatar img { width:100%; height:100%; object-fit:cover; }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 0.82rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-plan { font-size: 0.68rem; color: var(--muted); }
    .logout-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      font-size: 14px;
      transition: 0.2s;
    }
    .logout-btn:hover { color: var(--danger); }

    /* ══════════════════════════════════════
       MAIN CHAT AREA
    ══════════════════════════════════════ */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      min-width: 0;
      position: relative;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      gap: 12px;
    }
    .menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 20px;
      padding: 4px;
    }
    .topbar-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
    }
    .topbar-mode {
      padding: 4px 12px;
      background: rgba(91,142,255,0.1);
      border: 1px solid rgba(91,142,255,0.2);
      border-radius: 20px;
      font-size: 0.72rem;
      color: var(--accent);
      font-weight: 500;
    }
    .topbar-actions { display: flex; gap: 8px; }
    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: 0.2s;
    }
    .icon-btn:hover { background: var(--surface); color: var(--text); border-color: var(--border2); }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      animation: fadeIn 0.5s ease both;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .welcome-planet {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #2a3a7a, #0a0e1f);
      border: 2px solid rgba(91,142,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      margin-bottom: 24px;
      box-shadow: 0 0 40px rgba(91,142,255,0.2);
      animation: float 5s ease-in-out infinite;
      position: relative;
    }
    .welcome-ring {
      position: absolute;
      width: 110px;
      height: 28px;
      border: 1.5px solid rgba(167,139,250,0.3);
      border-radius: 50%;
      transform: rotateX(70deg);
    }
    .welcome h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #e8eaf0 30%, #7ba3ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .welcome p { color: var(--text2); font-size: 0.9rem; margin-bottom: 32px; }
    .suggestions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      max-width: 480px;
      width: 100%;
    }
    .suggestion {
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      font-size: 0.82rem;
      color: var(--text2);
      transition: 0.2s;
      line-height: 1.4;
    }
    .suggestion:hover { background: var(--surface2); border-color: rgba(91,142,255,0.3); color: var(--text); }
    .suggestion strong { display: block; color: var(--text); font-size: 0.78rem; margin-bottom: 3px; }

    /* Message bubbles */
    .msg-group {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      animation: msgIn 0.3s ease both;
    }
    @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg-group.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      margin-top: 2px;
      overflow: hidden;
    }
    .msg-avatar.ai {
      background: radial-gradient(circle at 35% 35%, #2a3a7a, #0a0e1f);
      border: 1px solid rgba(91,142,255,0.3);
      box-shadow: 0 0 10px rgba(91,142,255,0.15);
    }
    .msg-avatar.user-av {
      background: linear-gradient(135deg, #1a2a5a, #2a1a4a);
      border: 1px solid var(--border2);
    }
    .msg-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .msg-content { flex: 1; min-width: 0; max-width: 75%; }
    .msg-group.user .msg-content { display: flex; flex-direction: column; align-items: flex-end; }
    .msg-name { font-size: 0.72rem; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
    .msg-bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.65;
      max-width: 100%;
      word-break: break-word;
    }
    .msg-group.ai .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      color: var(--text);
    }
    .msg-group.user .msg-bubble {
      background: rgba(91,142,255,0.15);
      border: 1px solid rgba(91,142,255,0.2);
      border-radius: 16px 4px 16px 16px;
      color: var(--text);
    }
    .msg-bubble pre {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 0.82rem;
    }
    .msg-bubble code { font-family: 'Courier New', monospace; }
    .msg-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      opacity: 0;
      transition: 0.2s;
    }
    .msg-group:hover .msg-actions { opacity: 1; }
    .msg-action-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      padding: 3px 6px;
      border-radius: 4px;
      transition: 0.2s;
    }
    .msg-action-btn:hover { color: var(--text); background: var(--surface2); }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 12px;
      padding: 10px 0;
    }
    .typing-dots {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* ══════════════════════════════════════
       INPUT AREA
    ══════════════════════════════════════ */
    .input-area {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    .input-box {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 10px 12px;
      transition: border-color 0.2s;
    }
    .input-box:focus-within { border-color: rgba(91,142,255,0.4); box-shadow: 0 0 0 3px rgba(91,142,255,0.06); }
    .input-actions-left { display: flex; gap: 4px; align-items: flex-end; padding-bottom: 2px; }
    .attach-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      border-radius: 6px;
      transition: 0.2s;
      line-height: 1;
    }
    .attach-btn:hover { color: var(--text); }
    #chatInput {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      line-height: 1.5;
      resize: none;
      max-height: 160px;
      min-height: 24px;
      padding: 3px 0;
    }
    #chatInput::placeholder { color: var(--muted); }
    #chatInput::-webkit-scrollbar { width: 3px; }
    #chatInput::-webkit-scrollbar-thumb { background: var(--surface2); }
    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      transition: 0.2s;
      opacity: 0.4;
    }
    .send-btn.active { opacity: 1; transform: scale(1.05); }
    .send-btn:hover.active { background: #4a7aee; }
    .input-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      padding: 0 4px;
    }
    .input-hint { font-size: 0.7rem; color: var(--muted); }
    .voice-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      color: var(--text2);
      cursor: pointer;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: 0.2s;
    }
    .voice-btn:hover { border-color: var(--border2); color: var(--text); }
    .voice-btn.recording { border-color: rgba(239,68,68,0.5); color: var(--danger); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

    /* ══════════════════════════════════════
       IMAGE GENERATION MODE
    ══════════════════════════════════════ */
    .generated-image {
      border-radius: 12px;
      max-width: 100%;
      margin-top: 8px;
      border: 1px solid var(--border);
      display: block;
    }

    /* ══════════════════════════════════════
       SETTINGS PANEL
    ══════════════════════════════════════ */
    .settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .settings-overlay.open { display: flex; }
    .settings-panel {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 20px;
      width: 100%;
      max-width: 440px;
      padding: 28px;
      animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .settings-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .settings-close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
    }
    .settings-section { margin-bottom: 20px; }
    .settings-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.08em; }
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row-label { font-size: 0.875rem; }
    .toggle {
      width: 40px;
      height: 22px;
      background: var(--surface2);
      border-radius: 11px;
      border: 1px solid var(--border2);
      cursor: pointer;
      position: relative;
      transition: 0.2s;
    }
    .toggle.on { background: var(--accent); border-color: var(--accent); }
    .toggle::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      top: 2px;
      left: 2px;
      transition: 0.2s;
    }
    .toggle.on::after { left: 20px; }
    .lang-select {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      padding: 6px 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
    }

    /* ══════════════════════════════════════
       MOBILE OVERLAY
    ══════════════════════════════════════ */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 99;
    }

    /* ══════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════ */
    @media (max-width: 700px) {
      .sidebar {
        position: fixed;
        left: 0; top: 0;
        height: 100vh;
        transform: translateX(-100%);
        box-shadow: 4px 0 24px rgba(0,0,0,0.5);
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .menu-btn { display: flex; }
      .suggestions { grid-template-columns: 1fr; }
      .topbar-title { font-size: 0.85rem; }
      .msg-content { max-width: 88%; }
    }

    /* Scrollbar global */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }
  </style>
</head>
<body>

<!-- Sidebar overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- ══ SIDEBAR ══ -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo">
